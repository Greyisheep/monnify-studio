# Builds the web image with the API URL baked in as a build-time constant
# (Next.js inlines NEXT_PUBLIC_* at build, not at runtime) (#84).
steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_API_URL}
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
options:
  logging: CLOUD_LOGGING_ONLY
